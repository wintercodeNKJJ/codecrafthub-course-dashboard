<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeCraftHub - Learning Management Platform</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
        line-height: 1.6;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      header {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        margin-bottom: 30px;
        text-align: center;
      }

      h1 {
        color: #8b5cf6;
        font-size: 2.5em;
        margin-bottom: 10px;
      }

      .subtitle {
        color: #6b7280;
        font-size: 1.1em;
      }

      .form-section {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        margin-bottom: 30px;
      }

      .form-section h2 {
        color: #8b5cf6;
        margin-bottom: 20px;
        font-size: 1.8em;
      }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
      }

      .form-group.full-width {
        grid-column: 1 / -1;
      }

      label {
        font-weight: 600;
        color: #374151;
        margin-bottom: 8px;
        font-size: 0.95em;
      }

      input,
      textarea,
      select {
        padding: 12px;
        border: 2px solid #e5e7eb;
        border-radius: 8px;
        font-size: 1em;
        transition: border-color 0.3s;
        font-family: inherit;
      }

      input:focus,
      textarea:focus,
      select:focus {
        outline: none;
        border-color: #8b5cf6;
      }

      textarea {
        resize: vertical;
        min-height: 100px;
      }

      button {
        padding: 12px 30px;
        border: none;
        border-radius: 8px;
        font-size: 1em;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
      }

      .btn-primary {
        background: #8b5cf6;
        color: white;
      }

      .btn-primary:hover {
        background: #7c3aed;
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(139, 92, 246, 0.3);
      }

      .btn-success {
        background: #f59e0b;
        color: white;
        padding: 8px 16px;
        font-size: 0.9em;
      }

      .btn-success:hover {
        background: #d97706;
      }

      .btn-danger {
        background: #ef4444;
        color: white;
        padding: 8px 16px;
        font-size: 0.9em;
      }

      .btn-danger:hover {
        background: #dc2626;
      }

      .btn-secondary {
        background: #6b7280;
        color: white;
        padding: 8px 16px;
        font-size: 0.9em;
      }

      .btn-secondary:hover {
        background: #4b5563;
      }

      .courses-section {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      .courses-section h2 {
        color: #8b5cf6;
        margin-bottom: 20px;
        font-size: 1.8em;
      }

      .courses-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
      }

      .course-card {
        border: 2px solid #e5e7eb;
        border-radius: 10px;
        padding: 20px;
        transition: all 0.3s;
      }

      .course-card:hover {
        border-color: #8b5cf6;
        box-shadow: 0 4px 12px rgba(139, 92, 246, 0.2);
        transform: translateY(-4px);
      }

      .course-header {
        margin-bottom: 15px;
      }

      .course-name {
        color: #1f2937;
        font-size: 1.4em;
        font-weight: 700;
        margin-bottom: 8px;
      }

      .course-status {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.85em;
        font-weight: 600;
      }

      .status-not-started {
        background: #fee2e2;
        color: #991b1b;
      }

      .status-in-progress {
        background: #fef3c7;
        color: #92400e;
      }

      .status-completed {
        background: #d1fae5;
        color: #065f46;
      }

      .course-description {
        color: #6b7280;
        margin-bottom: 15px;
        line-height: 1.5;
      }

      .course-meta {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 15px;
        font-size: 0.9em;
        color: #6b7280;
      }

      .course-meta-item {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .course-meta-label {
        font-weight: 600;
        color: #374151;
      }

      .course-actions {
        display: flex;
        gap: 10px;
      }

      .message {
        padding: 15px 20px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-weight: 500;
        animation: slideIn 0.3s ease-out;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .message-success {
        background: #d1fae5;
        color: #065f46;
        border-left: 4px solid #10b981;
      }

      .message-error {
        background: #fee2e2;
        color: #991b1b;
        border-left: 4px solid #ef4444;
      }

      .loading {
        display: none;
        text-align: center;
        padding: 40px;
      }

      .loading.active {
        display: block;
      }

      .spinner {
        border: 4px solid #e5e7eb;
        border-top: 4px solid #8b5cf6;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
        margin: 0 auto;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #6b7280;
      }

      .empty-state-icon {
        font-size: 4em;
        margin-bottom: 20px;
      }

      .empty-state h3 {
        color: #374151;
        margin-bottom: 10px;
        font-size: 1.5em;
      }

      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        animation: fadeIn 0.3s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .modal.active {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .modal-content {
        background: white;
        border-radius: 10px;
        padding: 30px;
        max-width: 600px;
        width: 100%;
        max-height: 90vh;
        overflow-y: auto;
        animation: slideUp 0.3s ease-out;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .modal-header {
        margin-bottom: 25px;
      }

      .modal-header h2 {
        color: #8b5cf6;
        font-size: 1.8em;
      }

      .modal-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 25px;
      }

      @media (max-width: 768px) {
        h1 {
          font-size: 1.8em;
        }

        .form-grid {
          grid-template-columns: 1fr;
        }

        .courses-grid {
          grid-template-columns: 1fr;
        }

        .course-actions {
          flex-direction: column;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>🎓 CodeCraftHub</h1>
        <p class="subtitle">Your Learning Management Platform</p>
      </header>

      <div id="messageContainer"></div>

      <div class="form-section">
        <h2>📝 Add New Course</h2>
        <form id="courseForm">
          <div class="form-grid">
            <div class="form-group">
              <label for="name">Course Name *</label>
              <input
                type="text"
                id="name"
                name="name"
                required
                placeholder="e.g., Advanced JavaScript"
              />
            </div>
            <div class="form-group">
              <label for="target_date">Target Date *</label>
              <input type="date" id="target_date" name="target_date" required />
            </div>
            <div class="form-group">
              <label for="status">Status *</label>
              <select id="status" name="status" required>
                <option value="">Select Status</option>
                <option value="Not Started">Not Started</option>
                <option value="In Progress">In Progress</option>
                <option value="Completed">Completed</option>
              </select>
            </div>
            <div class="form-group full-width">
              <label for="description">Description *</label>
              <textarea
                id="description"
                name="description"
                required
                placeholder="Describe what you'll learn in this course..."
              ></textarea>
            </div>
          </div>
          <button type="submit" class="btn-primary">Add Course</button>
        </form>
      </div>

      <div class="courses-section">
        <h2>📚 My Courses</h2>
        <div class="loading" id="coursesLoading">
          <div class="spinner"></div>
          <p>Loading courses...</p>
        </div>
        <div id="coursesContainer" class="courses-grid"></div>
      </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>✏️ Edit Course</h2>
        </div>
        <form id="editCourseForm">
          <input type="hidden" id="edit_id" name="id" />
          <div class="form-grid">
            <div class="form-group">
              <label for="edit_name">Course Name *</label>
              <input type="text" id="edit_name" name="name" required />
            </div>
            <div class="form-group">
              <label for="edit_target_date">Target Date *</label>
              <input
                type="date"
                id="edit_target_date"
                name="target_date"
                required
              />
            </div>
            <div class="form-group">
              <label for="edit_status">Status *</label>
              <select id="edit_status" name="status" required>
                <option value="Not Started">Not Started</option>
                <option value="In Progress">In Progress</option>
                <option value="Completed">Completed</option>
              </select>
            </div>
            <div class="form-group full-width">
              <label for="edit_description">Description *</label>
              <textarea
                id="edit_description"
                name="description"
                required
              ></textarea>
            </div>
          </div>
          <div class="modal-actions">
            <button
              type="button"
              class="btn-secondary"
              onclick="closeEditModal()"
            >
              Cancel
            </button>
            <button type="submit" class="btn-success">Save Changes</button>
          </div>
        </form>
      </div>
    </div>

    <script>
      const API_BASE_URL = "http://localhost:5004/api/courses";

      // Show message to user
      function showMessage(message, type = "success") {
        const messageContainer = document.getElementById("messageContainer");
        const messageDiv = document.createElement("div");
        messageDiv.className = `message message-${type}`;
        messageDiv.textContent = message;
        messageContainer.appendChild(messageDiv);

        setTimeout(() => {
          messageDiv.remove();
        }, 5000);
      }

      // Format date for display
      function formatDate(dateString) {
        const options = { year: "numeric", month: "long", day: "numeric" };
        return new Date(dateString).toLocaleDateString("en-US", options);
      }

      // Get status class for styling
      function getStatusClass(status) {
        const statusMap = {
          "Not Started": "status-not-started",
          "In Progress": "status-in-progress",
          Completed: "status-completed",
        };
        return statusMap[status] || "status-not-started";
      }

      // Fetch all courses
      async function fetchCourses() {
        const loadingEl = document.getElementById("coursesLoading");
        const containerEl = document.getElementById("coursesContainer");

        loadingEl.classList.add("active");
        containerEl.innerHTML = "";

        try {
          const response = await fetch(API_BASE_URL);

          if (!response.ok) {
            throw new Error(`Failed to fetch courses: ${response.statusText}`);
          }

          const courses = await response.json();
          loadingEl.classList.remove("active");

          if (courses.length === 0) {
            containerEl.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <h3>No courses yet</h3>
                            <p>Start your learning journey by adding your first course above!</p>
                        </div>
                    `;
            return;
          }

          containerEl.innerHTML = courses
            .map(
              (course) => `
                    <div class="course-card">
                        <div class="course-header">
                            <h3 class="course-name">${escapeHtml(course.name)}</h3>
                            <span class="course-status ${getStatusClass(course.status)}">${escapeHtml(course.status)}</span>
                        </div>
                        <p class="course-description">${escapeHtml(course.description)}</p>
                        <div class="course-meta">
                            <div class="course-meta-item">
                                <span class="course-meta-label">Target Date:</span>
                                <span>${formatDate(course.target_date)}</span>
                            </div>
                            <div class="course-meta-item">
                                <span class="course-meta-label">Created:</span>
                                <span>${formatDate(course.created_at)}</span>
                            </div>
                        </div>
                        <div class="course-actions">
                            <button class="btn-success" onclick="openEditModal(${course.id})">Edit</button>
                            <button class="btn-danger" onclick="deleteCourse(${course.id})">Remove</button>
                        </div>
                    </div>
                `,
            )
            .join("");
        } catch (error) {
          loadingEl.classList.remove("active");
          containerEl.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <h3>Error loading courses</h3>
                        <p>${escapeHtml(error.message)}</p>
                        <p style="margin-top: 10px; font-size: 0.9em;">Make sure the backend server is running at ${API_BASE_URL}</p>
                    </div>
                `;
          showMessage(`Error: ${error.message}`, "error");
        }
      }

      // Escape HTML to prevent XSS
      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      // Add new course
      document
        .getElementById("courseForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const formData = new FormData(e.target);
          const courseData = {
            name: formData.get("name"),
            description: formData.get("description"),
            target_date: formData.get("target_date"),
            status: formData.get("status"),
          };

          try {
            const response = await fetch(API_BASE_URL, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify(courseData),
            }).catch((error) => {
              throw new Error(`Network error: ${error.message}`);
            });

            if (!response.ok) {
              throw new Error(`Failed to add course: ${response.statusText}`);
            }

            showMessage("Course added successfully!", "success");
            e.target.reset();
            await fetchCourses();
          } catch (error) {
            showMessage(`Error: ${error.message}`, "error");
          }
        });

      // Open edit modal
      let currentCourses = [];

      async function openEditModal(courseId) {
        try {
          const response = await fetch(API_BASE_URL);
          if (!response.ok) {
            throw new Error("Failed to fetch course details");
          }

          currentCourses = await response.json();
          const course = currentCourses.find((c) => c.id === courseId);

          if (!course) {
            throw new Error("Course not found");
          }

          document.getElementById("edit_id").value = course.id;
          document.getElementById("edit_name").value = course.name;
          document.getElementById("edit_description").value =
            course.description;
          document.getElementById("edit_target_date").value =
            course.target_date;
          document.getElementById("edit_status").value = course.status;

          document.getElementById("editModal").classList.add("active");
        } catch (error) {
          showMessage(`Error: ${error.message}`, "error");
        }
      }

      // Close edit modal
      function closeEditModal() {
        document.getElementById("editModal").classList.remove("active");
        document.getElementById("editCourseForm").reset();
      }

      // Close modal when clicking outside
      document.getElementById("editModal").addEventListener("click", (e) => {
        if (e.target.id === "editModal") {
          closeEditModal();
        }
      });

      // Update course
      document
        .getElementById("editCourseForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const formData = new FormData(e.target);
          const courseId = formData.get("id");
          const courseData = {
            name: formData.get("name"),
            description: formData.get("description"),
            target_date: formData.get("target_date"),
            status: formData.get("status"),
          };

          try {
            const response = await fetch(`${API_BASE_URL}/${courseId}`, {
              method: "PUT",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify(courseData),
            });

            if (!response.ok) {
              throw new Error(
                `Failed to update course: ${response.statusText}`,
              );
            }

            showMessage("Course updated successfully!", "success");
            closeEditModal();
            await fetchCourses();
          } catch (error) {
            showMessage(`Error: ${error.message}`, "error");
          }
        });

      // Delete course
      async function deleteCourse(courseId) {
        if (
          !confirm(
            "Are you sure you want to delete this course? This action cannot be undone.",
          )
        ) {
          return;
        }

        try {
          const response = await fetch(`${API_BASE_URL}/${courseId}`, {
            method: "DELETE",
          });

          if (!response.ok) {
            throw new Error(`Failed to delete course: ${response.statusText}`);
          }

          showMessage("Course deleted successfully!", "success");
          await fetchCourses();
        } catch (error) {
          showMessage(`Error: ${error.message}`, "error");
        }
      }

      // Load courses on page load
      fetchCourses();
    </script>
  </body>
</html>
